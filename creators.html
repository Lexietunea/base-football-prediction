<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Base Football — Top Creators</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   BASE FOOTBALL — SHARED STYLES (shared.css)
   ═══════════════════════════════════════════════ */
:root {
  --bg:#050608;--surface:#0d0f14;--card:#111318;--border:#1e2130;--border2:#252a3a;
  --blue:#0052ff;--blue-glow:#0052ff55;--blue-dim:#0039c0;
  --accent:#00d4ff;--green:#00e676;--gold:#ffd166;--red:#ef4444;
  --text:#e8ecf4;--muted:#6b7490;--muted2:#3d4460;
  --radius:12px;--radius-lg:18px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(0,82,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(0,230,118,0.03) 0%, transparent 50%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
}

/* ── LAYOUT ── */
.shell{display:grid;grid-template-columns:240px 1fr 300px;grid-template-rows:60px 1fr;min-height:100vh;position:relative;z-index:1;}
.shell.no-right{grid-template-columns:240px 1fr;}

/* ── TOPNAV ── */
.topnav{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;background:rgba(5,6,8,.95);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;gap:10px;font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:1px;cursor:pointer;text-decoration:none;color:var(--text);}
.logo-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;
  display:grid;place-items:center;font-size:16px;box-shadow:0 0 16px var(--blue-glow);}
.logo span{color:var(--blue);}
.nav-search{flex:1;max-width:360px;margin:0 32px;position:relative;}
.nav-search input{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:8px 14px 8px 36px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.nav-search input:focus{border-color:var(--blue);}
.nav-search input::placeholder{color:var(--muted);}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.nav-right{display:flex;align-items:center;gap:10px;}
.net-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;
  border-radius:99px;background:rgba(0,82,255,.12);color:var(--blue);
  border:1px solid rgba(0,82,255,.3);display:none;align-items:center;gap:5px;}
.net-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
.btn-wallet{display:flex;align-items:center;gap:8px;background:var(--blue);color:#fff;
  border:none;border-radius:8px;padding:9px 18px;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 0 16px var(--blue-glow);}
.btn-wallet:hover{background:var(--blue-dim);}
.btn-wallet.connected{background:var(--surface);border:1px solid var(--green);color:var(--green);box-shadow:none;}

/* ── LEFT SIDEBAR ── */
.sidebar-l{padding:24px 16px;border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px;overflow-y:auto;
  background:rgba(13,15,20,0.95);backdrop-filter:blur(10px);position:relative;z-index:1;}
.s-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:1.5px;padding:12px 12px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:var(--radius);cursor:pointer;font-size:14px;color:var(--muted);
  font-weight:500;transition:all .15s;position:relative;user-select:none;
  text-decoration:none;}
.nav-item:hover{background:var(--card);color:var(--text);}
.nav-item.active{background:rgba(0,82,255,.12);color:var(--blue);}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;background:var(--blue);border-radius:0 3px 3px 0;}
.league-item{display:flex;align-items:center;gap:10px;padding:9px 12px;
  border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--muted);
  transition:all .15s;user-select:none;}
.league-item:hover,.league-item.active{background:var(--card);color:var(--text);}
.l-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── PAGE CONTENT AREA ── */
.page{padding:28px;overflow-y:auto;position:relative;z-index:1;}

/* ── RIGHT SIDEBAR ── */
.sidebar-r{padding:24px 16px;border-left:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;gap:20px;background:var(--surface);}
.widget{background:rgba(17,19,24,0.92);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;backdrop-filter:blur(8px);}
.widget-head{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);}
.widget-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;}
.widget-link{font-size:11px;color:var(--blue);cursor:pointer;font-weight:500;}

/* ── CARDS ── */
.card{background:rgba(17,19,24,0.92);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:20px;transition:border-color .2s,transform .15s;backdrop-filter:blur(8px);}
.card:hover{border-color:var(--border2);}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:24px;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1.5px;color:var(--text);}
.page-sub{font-size:13px;color:var(--muted);margin-top:4px;}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:16px 20px;text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.5px;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab{padding:10px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;user-select:none;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}

/* ── BADGES ── */
.badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;
  border-radius:99px;border:1px solid;display:inline-flex;align-items:center;}
.badge-creator{border-color:var(--gold);color:var(--gold);}
.badge-topfan{border-color:var(--accent);color:var(--accent);}
.badge-verified{border-color:var(--green);color:var(--green);}
.badge-fan{border-color:var(--muted);color:var(--muted);}
.badge-live{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.1);animation:pulse 2s infinite;}
.badge-upcoming{border-color:var(--gold);color:var(--gold);background:rgba(255,209,102,.08);}
.badge-completed{border-color:var(--muted);color:var(--muted);}

/* ── BUTTONS ── */
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:9px;
  padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;box-shadow:0 0 12px var(--blue-glow);}
.btn-primary:hover{background:var(--blue-dim);}
.btn-outline{background:none;color:var(--muted);border:1px solid var(--border);border-radius:9px;
  padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
.btn-outline:hover{border-color:var(--border2);color:var(--text);}
.btn-green{background:var(--green);color:#000;border:none;border-radius:9px;
  padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:opacity .2s;}
.btn-green:hover{opacity:.88;}
.btn-green:disabled{opacity:.5;cursor:not-allowed;}

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);
  backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:20px;
  padding:28px;width:100%;max-width:420px;animation:popIn .25s ease;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.55;}
.modal-btns{display:flex;gap:10px;margin-top:16px;}
.gas-note{background:rgba(0,82,255,.07);border:1px solid rgba(0,82,255,.2);
  border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:12px;
  color:var(--muted);line-height:1.55;}
.gas-note strong{color:var(--blue);}

/* ── WALLET MODAL ── */
.wallet-opt{display:flex;align-items:center;gap:14px;padding:15px;
  border:1px solid var(--border);border-radius:13px;cursor:pointer;transition:all .2s;margin-bottom:10px;}
.wallet-opt:hover{border-color:var(--blue);background:rgba(0,82,255,.05);}
.wallet-ico{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:24px;flex-shrink:0;}
.wallet-opt-name{font-size:14px;font-weight:600;color:var(--text);}
.wallet-opt-desc{font-size:11px;color:var(--muted);margin-top:2px;}

/* ── TIP MODAL ── */
.tip-creator-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.tip-cr-av{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;
  font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;flex-shrink:0;}
.tip-cr-name{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--text);}
.tip-cr-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.tip-section-label{font-size:11px;color:var(--muted);font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.tip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.tip-tile{padding:12px 8px;border:1px solid var(--border);border-radius:10px;
  text-align:center;cursor:pointer;transition:all .15s;user-select:none;}
.tip-tile:hover,.tip-tile.sel{border-color:var(--green);background:rgba(0,230,118,.07);}
.tip-tile-eth{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text);}
.tip-tile.sel .tip-tile-eth{color:var(--green);}
.tip-tile-usd{font-size:10px;color:var(--muted);margin-top:2px;}
.tip-divider{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:11px;color:var(--muted);}
.tip-divider::before,.tip-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.custom-wrap{position:relative;margin-bottom:16px;}
.custom-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:11px 48px 11px 14px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color .2s;}
.custom-wrap input:focus{border-color:var(--green);}
.custom-wrap input::placeholder{color:var(--muted2);}
.custom-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.tx-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--muted);text-align:center;display:none;}
.tx-box.show{display:block;}
.tx-link{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--blue);
  cursor:pointer;text-decoration:underline;}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;right:28px;background:var(--card);border-radius:12px;
  padding:14px 20px;font-size:13px;font-weight:500;display:flex;align-items:center;
  gap:8px;z-index:3000;transform:translateY(80px);opacity:0;max-width:360px;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  border:1px solid var(--green);color:var(--green);box-shadow:0 8px 32px rgba(0,230,118,.15);}
.toast.err{border-color:var(--red);color:var(--red);box-shadow:0 8px 32px rgba(239,68,68,.15);}
.toast.show{transform:translateY(0);opacity:1;}

/* ── SPINNER ── */
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:rotate .7s linear infinite;display:inline-block;vertical-align:middle;}
.spin.dark{border-color:rgba(0,0,0,.2);border-top-color:#000;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:56px 20px;color:var(--muted);}
.empty-ico{font-size:52px;margin-bottom:14px;}
.empty-text{font-size:14px;line-height:1.6;}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;
  padding:40px;color:var(--muted);font-size:13px;}

/* ── TRENDING WIDGET ── */
.trend-item{padding:10px 16px;cursor:pointer;transition:background .15s;}
.trend-item:hover{background:rgba(255,255,255,.02);}
.trend-tag{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--blue);}
.trend-count{font-size:11px;color:var(--muted);margin-top:2px;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes popIn{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes rotate{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .shell{grid-template-columns:220px 1fr!important;}
  .sidebar-r{display:none;}
}
@media(max-width:720px){
  .shell{grid-template-columns:1fr!important;}
  .sidebar-l{display:none;}
  .page{padding:16px;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
}

/* ── MOBILE BOTTOM NAV ── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(5,6,8,.97);border-top:1px solid var(--border);
  z-index:150;padding:8px 0 max(8px,env(safe-area-inset-bottom));
  backdrop-filter:blur(20px);}
.mobile-nav-inner{display:flex;justify-content:space-around;align-items:center;}
.mob-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 12px;cursor:pointer;color:var(--muted);text-decoration:none;
  transition:color .2s;font-size:10px;}
.mob-nav-item:hover,.mob-nav-item.active{color:var(--blue);}
.mob-nav-item svg{width:20px;height:20px;}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .shell{grid-template-columns:220px 1fr!important;}
  .sidebar-r{display:none!important;}
}
@media(max-width:768px){
  .shell{grid-template-columns:1fr!important;}
  .shell.no-right{grid-template-columns:1fr!important;}
  .sidebar-l{display:none!important;}
  .page{padding:16px;padding-bottom:80px;}
  .topnav{padding:0 16px;}
  .nav-search{display:none;}
  .logo{font-size:18px;}
  .logo-icon{width:28px;height:28px;font-size:14px;}
  .btn-wallet{padding:7px 12px;font-size:12px;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .mobile-nav{display:block;}
}
@media(max-width:400px){
  .stats-row{grid-template-columns:1fr 1fr;}
}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<style>
.creator-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px;}
.creator-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:22px;transition:all .2s;animation:fadeUp .4s ease both;cursor:pointer;position:relative;overflow:hidden;}
.creator-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.creator-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;}
.creator-card.rank-1::before{background:var(--gold);}
.creator-card.rank-2::before{background:#94a3b8;}
.creator-card.rank-3::before{background:#cd7c2f;}
.creator-card-top{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.creator-av-wrap{position:relative;flex-shrink:0;}
.creator-av{width:52px;height:52px;border-radius:50%;display:grid;place-items:center;
  font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;}
.creator-rank-badge{position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;
  border-radius:50%;background:var(--card);border:2px solid var(--border);
  display:grid;place-items:center;font-family:'Bebas Neue',sans-serif;font-size:11px;}
.rank-1 .creator-rank-badge{color:var(--gold);}
.rank-2 .creator-rank-badge{color:#94a3b8;}
.rank-3 .creator-rank-badge{color:#cd7c2f;}
.creator-info{flex:1;min-width:0;}
.creator-name{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;
  color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.creator-team{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px;}
.creator-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
  background:var(--surface);border-radius:10px;padding:12px;margin-bottom:14px;}
.cstat{text-align:center;}
.cstat-val{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.5px;}
.cstat-lbl{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.creator-actions{display:flex;gap:8px;}
.btn-follow{flex:1;padding:8px;border:1px solid var(--border);border-radius:9px;
  background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;
  font-weight:500;cursor:pointer;transition:all .2s;}
.btn-follow:hover,.btn-follow.following{border-color:var(--blue);color:var(--blue);background:rgba(0,82,255,.06);}
.btn-tip-creator{flex:1;padding:8px;border:1px solid rgba(0,230,118,.3);border-radius:9px;
  background:rgba(0,230,118,.05);color:var(--green);font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-tip-creator:hover{border-color:var(--green);background:rgba(0,230,118,.1);}

/* LEADERBOARD TABLE */
.lb-table{width:100%;border-collapse:collapse;margin-bottom:24px;}
.lb-table th{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;padding:10px 16px;
  border-bottom:1px solid var(--border);text-align:left;font-weight:600;}
.lb-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.lb-table tr:hover td{background:rgba(255,255,255,.02);}
.lb-table tr:last-child td{border-bottom:none;}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted2);width:40px;}
.lb-rank.gold{color:var(--gold);}
.lb-rank.silver{color:#94a3b8;}

<script>
// ═══════════════════════════════════════════════════════
// BASE FOOTBALL — SHARED JS (shared.js)
// All pages include this file for wallet + tipping + nav
// ═══════════════════════════════════════════════════════

const API           = 'http://localhost:3001';
const BASE_CHAIN_ID = '0x2105'; // Base Mainnet 8453
const BASE_EXPLORER = 'https://basescan.org';
const CONTRACT_ADDRESS = '0x0000000000000000000000000000000000000000'; // replace after deploying
const CONTRACT_ABI = [
  "function tipCreator(address payable creatorWallet, string calldata postId) external payable",
  "function registerCreator(string calldata username) external",
  "function withdraw() external",
  "function getBalance(address wallet) external view returns (uint256)",
  "event TipSent(address indexed from, address indexed to, uint256 amount, uint256 creatorAmount, uint256 platformFee, string postId)"
];

// ── STATE ──────────────────────────────────────────────
let walletAddress   = null;
let provider        = null;
let signer          = null;
let contract        = null;
let selectedTip     = '0.001';
let tipTargetWallet = null;
let tipTargetName   = null;
let currentTxHash   = null;

// ── WALLET ─────────────────────────────────────────────
function openWalletModal() {
  if (walletAddress) { showToast('Connected: ' + short(walletAddress)); return; }
  openModal('wallet-modal');
}

async function connectWallet(type) {
  closeModal('wallet-modal');
  try {
    let eth = window.ethereum;
    if (!eth) {
      showToast(type === 'metamask' ? '🦊 Install MetaMask from metamask.io' : '🔵 Install Coinbase Wallet', true);
      return;
    }
    if (window.ethereum?.providers) {
      const found = window.ethereum.providers.find(p => type === 'coinbase' ? p.isCoinbaseWallet : p.isMetaMask);
      if (found) eth = found;
    }
    showToast('Connecting…');
    const accounts = await eth.request({ method: 'eth_requestAccounts' });
    walletAddress  = accounts[0];
    await switchToBase(eth);
    provider = new ethers.BrowserProvider(eth);
    signer   = await provider.getSigner();
    if (CONTRACT_ADDRESS !== '0x0000000000000000000000000000000000000000') {
      contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
    }
    updateWalletUI();
    showToast('✅ Connected to Base Mainnet!');
    eth.on('accountsChanged', a => { walletAddress = a[0] || null; updateWalletUI(); });
    eth.on('chainChanged', () => location.reload());
  } catch (e) {
    if (e.code === 4001) showToast('Cancelled', true);
    else showToast('Failed: ' + (e.message?.slice(0, 60) || 'Error'), true);
  }
}

async function switchToBase(eth) {
  try {
    await eth.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: BASE_CHAIN_ID }] });
  } catch (e) {
    if (e.code === 4902) {
      await eth.request({
        method: 'wallet_addEthereumChain',
        params: [{
          chainId: BASE_CHAIN_ID, chainName: 'Base',
          nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
          rpcUrls: ['https://mainnet.base.org'],
          blockExplorerUrls: [BASE_EXPLORER],
        }]
      });
    }
  }
}

function updateWalletUI() {
  const btn   = document.getElementById('wallet-btn');
  const text  = document.getElementById('wallet-text');
  const badge = document.getElementById('net-badge');
  const av    = document.getElementById('my-av');
  if (walletAddress) {
    btn.classList.add('connected');
    text.textContent = short(walletAddress);
    if (badge) badge.style.display = 'flex';
    if (av) { av.textContent = walletAddress.slice(2,4).toUpperCase(); av.style.background = 'linear-gradient(135deg,#0052ff,#00d4ff)'; }
  } else {
    btn.classList.remove('connected');
    text.textContent = 'Connect Wallet';
    if (badge) badge.style.display = 'none';
    if (av) { av.textContent = '⚽'; av.style.background = ''; }
  }
}

// ── TIPPING ────────────────────────────────────────────
function openTipModal(name, wallet, initials, gradient, event) {
  if (event) event.stopPropagation();
  if (!walletAddress) {
    showToast('Connect your wallet first!', true);
    setTimeout(openWalletModal, 700);
    return;
  }
  tipTargetName   = name;
  tipTargetWallet = wallet || null;

  const av = document.getElementById('tip-av');
  if (av) { av.textContent = initials || name.slice(0,2).toUpperCase(); if (gradient) av.style.background = gradient; }
  const tipName = document.getElementById('tip-name');
  if (tipName) tipName.textContent = name;

  selectedTip = '0.001';
  document.querySelectorAll('.tip-tile').forEach(t => t.classList.remove('sel'));
  const firstTile = document.querySelector('.tip-tile');
  if (firstTile) firstTile.classList.add('sel');
  const customRow = document.getElementById('custom-row');
  if (customRow) customRow.style.display = 'none';
  const customAmt = document.getElementById('custom-amt');
  if (customAmt) customAmt.value = '';
  const txBox = document.getElementById('tx-box');
  if (txBox) txBox.classList.remove('show');
  const sendText = document.getElementById('send-text');
  if (sendText) sendText.textContent = 'Send Tip on Base';
  const sendBtn = document.getElementById('send-btn');
  if (sendBtn) sendBtn.disabled = false;
  currentTxHash = null;

  openModal('tip-modal');
}

function selTip(el, val) {
  document.querySelectorAll('.tip-tile').forEach(t => t.classList.remove('sel'));
  el.classList.add('sel');
  selectedTip = val;
  const customRow = document.getElementById('custom-row');
  if (customRow) customRow.style.display = val === 'custom' ? 'block' : 'none';
  if (val !== 'custom') { const a = document.getElementById('custom-amt'); if (a) a.value = ''; }
}

async function confirmTip() {
  if (!walletAddress || !signer) { showToast('Connect your wallet first!', true); return; }
  let amount = selectedTip;
  if (selectedTip === 'custom') {
    amount = document.getElementById('custom-amt')?.value.trim();
    if (!amount || isNaN(parseFloat(amount)) || parseFloat(amount) <= 0) {
      showToast('Enter a valid ETH amount', true); return;
    }
  }
  const sendBtn  = document.getElementById('send-btn');
  const sendText = document.getElementById('send-text');
  const txBox    = document.getElementById('tx-box');
  const txMsg    = document.getElementById('tx-msg');
  if (sendBtn)  sendBtn.disabled = true;
  if (sendText) sendText.innerHTML = '<span class="spin dark"></span> Confirm in wallet…';
  if (txBox)    txBox.classList.add('show');
  if (txMsg)    txMsg.textContent = '⏳ Waiting for wallet confirmation…';
  try {
    const amountWei = ethers.parseEther(amount);
    if (contract && CONTRACT_ADDRESS !== '0x0000000000000000000000000000000000000000' && tipTargetWallet) {
      const tx = await contract.tipCreator(tipTargetWallet, `tip_${Date.now()}`, { value: amountWei });
      currentTxHash = tx.hash;
      if (txMsg) txMsg.textContent = '⏳ Transaction sent! Confirming on Base…';
      const hashRow = document.getElementById('tx-hash-row');
      const hashEl  = document.getElementById('tx-hash');
      if (hashRow) hashRow.style.display = 'block';
      if (hashEl)  hashEl.textContent = short(tx.hash);
      const receipt = await tx.wait();
      if (txMsg) txMsg.textContent = `✅ Confirmed in block #${receipt.blockNumber}`;
      if (sendText) sendText.textContent = '✅ Tip Sent!';
      showToast(`✅ ${amount} ETH tipped to ${tipTargetName} on Base!`);
      setTimeout(() => closeModal('tip-modal'), 2500);
    } else {
      if (txMsg) txMsg.textContent = '⚠️ Deploy BaseFootball.sol on Base Mainnet first.';
      if (sendText) sendText.textContent = 'Contract not deployed';
      showToast('Deploy contract to enable live tips!', true);
    }
  } catch (e) {
    if (txBox) txBox.classList.remove('show');
    if (e.code === 4001 || e.code === 'ACTION_REJECTED') showToast('Transaction cancelled', true);
    else showToast('Tip failed: ' + (e.message?.slice(0,80) || 'Error'), true);
    if (sendText) sendText.textContent = 'Send Tip on Base';
    if (sendBtn)  sendBtn.disabled = false;
  }
}

function openExplorer() {
  if (currentTxHash) window.open(`${BASE_EXPLORER}/tx/${currentTxHash}`, '_blank');
}

// ── MODAL HELPERS ──────────────────────────────────────
function openModal(id)  { const el = document.getElementById(id); if (el) el.classList.add('open'); }
function closeModal(id) { const el = document.getElementById(id); if (el) el.classList.remove('open'); }
function overlayClose(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

// ── TOAST ──────────────────────────────────────────────
let _tt;
function showToast(msg, isErr = false) {
  clearTimeout(_tt);
  const el = document.getElementById('toast');
  if (!el) return;
  document.getElementById('toast-ico').textContent = isErr ? '❌' : '✅';
  document.getElementById('toast-msg').textContent = msg;
  el.classList.toggle('err', isErr);
  el.classList.add('show');
  _tt = setTimeout(() => el.classList.remove('show'), 4500);
}

// ── UTILS ──────────────────────────────────────────────
function short(addr) { return addr ? `${addr.slice(0,6)}…${addr.slice(-4)}` : ''; }
function escHtml(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(d)  {
  if (!d) return '';
  const s = Math.floor((Date.now() - new Date(d)) / 1000);
  if (s < 60) return `${s}s ago`; if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`; return `${Math.floor(s/86400)}d ago`;
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}
function fmtKickoff(d) {
  if (!d) return '';
  const dt = new Date(d), now = new Date(), diff = dt - now;
  if (diff < 0) return fmtDate(d);
  if (diff < 3600000) return `In ${Math.floor(diff/60000)}m`;
  if (diff < 86400000) return `Today ${dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
  return dt.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

  const grid = document.getElementById('creator-grid');
  grid.innerHTML = filteredCreators.map((c,i) => `
    <div class="creator-card rank-${c.rank<=3?c.rank:'other'}" style="animation-delay:${i*.06}s">
      <div class="creator-card-top">
        <div class="creator-av-wrap">
          <div class="creator-av" style="background:${c.gradient}">${c.initials}</div>
          <div class="creator-rank-badge">${c.rank}</div>
        </div>
        <div class="creator-info">
          <div class="creator-name">${escHtml(c.name)}</div>
          <div class="creator-team">
            <span class="badge badge-${c.badge.toLowerCase().replace(' ','')}">${c.badge}</span>
            ${escHtml(c.team)} · ${escHtml(c.league)}
          </div>
        </div>
      </div>
      <div class="creator-stats">
        <div class="cstat"><div class="cstat-val" style="color:var(--green)">${c.eth} ETH</div><div class="cstat-lbl">Earned</div></div>
        <div class="cstat"><div class="cstat-val" style="color:var(--blue)">${c.followers}</div><div class="cstat-lbl">Followers</div></div>
        <div class="cstat"><div class="cstat-val" style="color:var(--text)">${c.posts}</div><div class="cstat-lbl">Posts</div></div>
      </div>
      <div class="creator-actions">
        <button class="btn-follow ${following.has(c.name)?'following':''}" onclick="toggleFollow(this,'${c.name}')">
          ${following.has(c.name)?'✓ Following':'+ Follow'}
        </button>
        <button class="btn-tip-creator" onclick="openTipModal('${escHtml(c.name)}','${c.wallet}','${c.initials}','${c.gradient}')">
          ⬡ Tip on Base
        </button>
      </div>
    </div>`).join('');
}

function renderTable() {
  const body = document.getElementById('lb-body');
  const rankClass = r => r===1?'gold':r===2?'silver':r===3?'bronze':'';
  body.innerHTML = filteredCreators.map(c => `
    <tr>
      <td><span class="lb-rank ${rankClass(c.rank)}">${c.rank}</span></td>
      <td><div class="lb-creator-cell">
        <div class="lb-av" style="background:${c.gradient}">${c.initials}</div>
        <div><div class="lb-name">${escHtml(c.name)}</div><div class="lb-team">${escHtml(c.team)} · ${escHtml(c.league)}</div></div>
      </div></td>
      <td><span class="lb-eth">${c.eth} ETH</span></td>
      <td><span class="lb-pts">${c.followers}</span></td>
      <td><span class="lb-posts">${c.posts}</span></td>
      <td><button class="btn-tip-creator" style="padding:6px 12px" onclick="openTipModal('${escHtml(c.name)}','${c.wallet}','${c.initials}','${c.gradient}')">⬡ Tip</button></td>
    </tr>`).join('');
}

function setTab(el, view) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentView = view;
  document.getElementById('cards-view').style.display = view==='cards'?'block':'none';
  document.getElementById('table-view').style.display = view==='table'?'block':'none';
  if (view==='table') renderTable();
}

function filterCreators(q) {
  const s = q.toLowerCase();
  filteredCreators = CREATORS.filter(c =>
    c.name.toLowerCase().includes(s) ||
    c.team.toLowerCase().includes(s) ||
    c.league.toLowerCase().includes(s)
  );
  if (currentView==='cards') renderCards(); else renderTable();
}

function toggleFollow(btn, name) {
  if (following.has(name)) { following.delete(name); btn.textContent='+ Follow'; btn.classList.remove('following'); showToast('Unfollowed'); }
  else { following.add(name); btn.textContent='✓ Following'; btn.classList.add('following'); showToast(`Following ${name}!`); }
}

function onLeagueFilter(league) {
  filteredCreators = league==='all' ? [...CREATORS] : CREATORS.filter(c=>c.league===league);
  if (currentView==='cards') renderCards(); else renderTable();
}

window.addEventListener('load', renderCards);
</script>
